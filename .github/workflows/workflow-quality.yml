name: "Workflow Quality"

on:
  workflow_call:

  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: workflow-quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  actionlint:
    name: "Lint GitHub Actions"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run actionlint
        uses: docker://rhysd/actionlint:1.7.12
        with:
          args: -color

  shellcheck:
    name: "Lint Shell Scripts"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run ShellCheck
        run: shellcheck scripts/*.sh

  ansible-quality:
    name: "Lint and syntax-check Ansible"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install validation tools
        run: python -m pip install "ansible-core~=2.18.0" "yamllint~=1.37.0"

      - name: Lint Ansible YAML
        run: >-
          yamllint
          -d '{extends: default, rules: {line-length: {max: 140}}}'
          ansible

      - name: Check playbook syntax
        working-directory: ansible
        run: >-
          ansible-playbook
          -i inventories/example/hosts.yml
          --syntax-check
          playbooks/configure-openvpn-network.yml
