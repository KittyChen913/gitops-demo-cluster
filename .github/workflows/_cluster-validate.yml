# =============================================================================
# _cluster-validate.yml — 可重用 Cluster 驗證
# =============================================================================
# 每個 matrix job 只讀取目標 Cluster 的單一 SSM path，並共用該組認證依序執行
# health、SA/RBAC 與 readiness 檢查，避免重複建立 runner 與重複解密參數。
# =============================================================================

name: "[Reusable] Cluster Validation"

on:
  workflow_call:
    inputs:
      environment:
        description: "Target environment (dev | prod)"
        type: string
        required: true
      cluster_labels:
        description: "Space-separated list of cluster labels to validate (auto-discovered if empty)"
        type: string
        default: ""
    secrets:
      AWS_ACCOUNT_ID:
        description: "AWS account ID used by the OIDC role ARN"
        required: true
    outputs:
      validation_result:
        description: "Overall validation result (success | failure)"
        value: ${{ jobs.validation-gate.outputs.result }}

jobs:
  discover-clusters:
    name: "Discover Clusters [${{ inputs.environment }}]"
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}
      count: ${{ steps.discover.outputs.count }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "~1.10"
          terraform_wrapper: false

      - name: Configure AWS Credentials
        uses: ./.github/actions/configure-aws-credentials
        with:
          aws-account-id: ${{ secrets.AWS_ACCOUNT_ID }}
          aws-region: ap-southeast-1

      - name: Resolve Cluster Matrix
        id: discover
        env:
          ENV_INPUT: ${{ inputs.environment }}
          LABELS_INPUT: ${{ inputs.cluster_labels }}
        run: |
          MATRIX=$(CLUSTER_ENV="${ENV_INPUT}" \
            CLUSTER_LABELS="${LABELS_INPUT}" \
            bash scripts/discover-clusters.sh)

          COUNT=$(jq 'length' <<< "${MATRIX}")
          echo "matrix=${MATRIX}" >> "$GITHUB_OUTPUT"
          echo "count=${COUNT}" >> "$GITHUB_OUTPUT"
          echo "Resolved cluster matrix: ${MATRIX}"

  validate-clusters:
    name: "Validate [${{ inputs.environment }} / ${{ matrix.cluster_label }}]"
    runs-on: ubuntu-latest
    needs: discover-clusters

    strategy:
      fail-fast: false
      matrix:
        cluster_label: ${{ fromJSON(needs.discover-clusters.outputs.matrix) }}

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure AWS Credentials
        uses: ./.github/actions/configure-aws-credentials
        with:
          aws-account-id: ${{ secrets.AWS_ACCOUNT_ID }}
          aws-region: ap-southeast-1

      - name: Fetch Cluster Credentials
        uses: ./.github/actions/get-ssm-parameters
        with:
          ssm_param_path: "/gitops/${{ inputs.environment }}/clusters/${{ matrix.cluster_label }}"

      - name: Install kubectl
        uses: azure/setup-kubectl@v5
        with:
          version: "v1.29.0"

      - name: Run Health Check
        id: health
        continue-on-error: true
        env:
          CLUSTER_ENV: ${{ inputs.environment }}
          CLUSTER_LABEL: ${{ matrix.cluster_label }}
        run: bash scripts/check-cluster-health.sh

      - name: Run SA/RBAC Verification
        id: rbac
        continue-on-error: true
        env:
          CLUSTER_ENV: ${{ inputs.environment }}
          CLUSTER_LABEL: ${{ matrix.cluster_label }}
        run: bash scripts/verify-sa-rbac.sh

      - name: Run End-to-End Readiness Validation
        id: readiness
        continue-on-error: true
        env:
          CLUSTER_ENV: ${{ inputs.environment }}
          CLUSTER_LABEL: ${{ matrix.cluster_label }}
        run: bash scripts/validate-cluster-readiness.sh

      - name: Evaluate Cluster Validation
        if: always()
        env:
          TARGET_ENV: ${{ inputs.environment }}
          CLUSTER_LABEL: ${{ matrix.cluster_label }}
          HEALTH_RESULT: ${{ steps.health.outcome }}
          RBAC_RESULT: ${{ steps.rbac.outcome }}
          READINESS_RESULT: ${{ steps.readiness.outcome }}
        run: |
          {
            echo "## Cluster Validation: \`${CLUSTER_LABEL}\`"
            echo ""
            echo "| Check | Result |"
            echo "|-------|--------|"
            echo "| Environment | \`${TARGET_ENV}\` |"
            echo "| Health Check | ${HEALTH_RESULT:-skipped} |"
            echo "| SA/RBAC Verify | ${RBAC_RESULT:-skipped} |"
            echo "| Readiness Validation | ${READINESS_RESULT:-skipped} |"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "${HEALTH_RESULT}" != "success" ] || \
             [ "${RBAC_RESULT}" != "success" ] || \
             [ "${READINESS_RESULT}" != "success" ]; then
            echo "::error title=Cluster Validation Failed::${CLUSTER_LABEL} 有一個以上檢查失敗"
            exit 1
          fi

  validation-gate:
    name: "Validation Gate [${{ inputs.environment }}]"
    runs-on: ubuntu-latest
    needs: [discover-clusters, validate-clusters]
    if: always()

    outputs:
      result: ${{ steps.gate.outputs.result }}

    steps:
      - name: Evaluate Gate
        id: gate
        env:
          DISCOVERY_RESULT: ${{ needs.discover-clusters.result }}
          VALIDATION_RESULT: ${{ needs.validate-clusters.result }}
        run: |
          if [ "${DISCOVERY_RESULT}" = "success" ] && \
             [ "${VALIDATION_RESULT}" = "success" ]; then
            echo "result=success" >> "$GITHUB_OUTPUT"
          else
            echo "result=failure" >> "$GITHUB_OUTPUT"
          fi

      - name: Post Validation Summary
        if: always()
        env:
          ENV_INPUT: ${{ inputs.environment }}
          CLUSTER_COUNT: ${{ needs.discover-clusters.outputs.count || '0' }}
          DISCOVERY_RESULT: ${{ needs.discover-clusters.result }}
          VALIDATION_RESULT: ${{ needs.validate-clusters.result }}
          OVERALL_RESULT: ${{ steps.gate.outputs.result }}
        run: |
          {
            echo "## Cluster Validation: \`${ENV_INPUT}\`"
            echo ""
            echo "| Check | Result |"
            echo "|-------|--------|"
            echo "| Discovery (${CLUSTER_COUNT} clusters) | ${DISCOVERY_RESULT} |"
            echo "| Per-Cluster Validation | ${VALIDATION_RESULT} |"
            echo "| **Overall Gate** | **${OVERALL_RESULT}** |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Enforce Gate
        if: steps.gate.outputs.result != 'success'
        run: |
          echo "::error title=Validation Gate Failed::One or more cluster validations failed"
          exit 1
