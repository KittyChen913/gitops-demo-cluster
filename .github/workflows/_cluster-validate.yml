# =============================================================================
# _cluster-validate.yml — 可復用 Cluster 驗證
# =============================================================================
# 呼叫者: cluster-post-provision.yml
#
# 先探索目標 cluster，再以 matrix 讓每個 job 只載入一個 cluster 的 SSM
# path，依序執行健康檢查、SA/RBAC 與就緒狀態驗證。
# =============================================================================

name: "[Reusable] Cluster Validation"

on:
  workflow_call:
    inputs:
      environment:
        description: "Target environment (dev | prod)"
        type: string
        required: true
      cluster_labels:
        description: "Space-separated list of cluster labels to validate (auto-discovered if empty)"
        type: string
        default: ""
    secrets:
      AWS_ACCOUNT_ID:
        description: "AWS account ID used by the OIDC role ARN"
        required: true

    outputs:
      validation_result:
        description: "Overall validation result (success | failure)"
        value: ${{ jobs.readiness-gate.outputs.result }}

jobs:
  discover-clusters:
    name: "Discover Clusters [${{ inputs.environment }}]"
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}
      count: ${{ steps.discover.outputs.count }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "~1.10"
          terraform_wrapper: false

      - name: Configure AWS Credentials
        uses: ./.github/actions/configure-aws-credentials
        with:
          aws-account-id: ${{ secrets.AWS_ACCOUNT_ID }}
          aws-region: ap-southeast-1

      - name: Resolve Cluster Matrix
        id: discover
        env:
          ENV_INPUT: ${{ inputs.environment }}
          LABELS_INPUT: ${{ inputs.cluster_labels }}
        run: |
          MATRIX=$(CLUSTER_ENV="${ENV_INPUT}" \
            CLUSTER_LABELS="${LABELS_INPUT}" \
            bash scripts/discover-clusters.sh)

          COUNT=$(jq 'length' <<< "${MATRIX}")
          echo "matrix=${MATRIX}" >> "$GITHUB_OUTPUT"
          echo "count=${COUNT}" >> "$GITHUB_OUTPUT"
          echo "Resolved cluster matrix: ${MATRIX}"

  health-check:
    name: "Health Check [${{ inputs.environment }} / ${{ matrix.cluster_label }}]"
    runs-on: ubuntu-latest
    needs: discover-clusters

    strategy:
      fail-fast: false
      matrix:
        cluster_label: ${{ fromJSON(needs.discover-clusters.outputs.matrix) }}

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure AWS Credentials
        uses: ./.github/actions/configure-aws-credentials
        with:
          aws-account-id: ${{ secrets.AWS_ACCOUNT_ID }}
          aws-region: ap-southeast-1

      - name: Fetch Cluster Credentials
        uses: ./.github/actions/get-ssm-parameters
        with:
          ssm_param_path: "/gitops/${{ inputs.environment }}/clusters/${{ matrix.cluster_label }}"

      - name: Install kubectl
        uses: azure/setup-kubectl@v5
        with:
          version: "v1.29.0"

      - name: Run Health Check
        env:
          CLUSTER_ENV: ${{ inputs.environment }}
          CLUSTER_LABEL: ${{ matrix.cluster_label }}
        run: bash scripts/check-cluster-health.sh

  verify-sa-rbac:
    name: "Verify SA/RBAC [${{ inputs.environment }} / ${{ matrix.cluster_label }}]"
    runs-on: ubuntu-latest
    needs: [discover-clusters, health-check]

    strategy:
      fail-fast: false
      matrix:
        cluster_label: ${{ fromJSON(needs.discover-clusters.outputs.matrix) }}

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure AWS Credentials
        uses: ./.github/actions/configure-aws-credentials
        with:
          aws-account-id: ${{ secrets.AWS_ACCOUNT_ID }}
          aws-region: ap-southeast-1

      - name: Fetch Cluster Credentials
        uses: ./.github/actions/get-ssm-parameters
        with:
          ssm_param_path: "/gitops/${{ inputs.environment }}/clusters/${{ matrix.cluster_label }}"

      - name: Install kubectl
        uses: azure/setup-kubectl@v5
        with:
          version: "v1.29.0"

      - name: Run SA/RBAC Verification
        env:
          CLUSTER_ENV: ${{ inputs.environment }}
          CLUSTER_LABEL: ${{ matrix.cluster_label }}
        run: bash scripts/verify-sa-rbac.sh

  readiness-validation:
    name: "Readiness [${{ inputs.environment }} / ${{ matrix.cluster_label }}]"
    runs-on: ubuntu-latest
    needs: [discover-clusters, verify-sa-rbac]

    strategy:
      fail-fast: false
      matrix:
        cluster_label: ${{ fromJSON(needs.discover-clusters.outputs.matrix) }}

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure AWS Credentials
        uses: ./.github/actions/configure-aws-credentials
        with:
          aws-account-id: ${{ secrets.AWS_ACCOUNT_ID }}
          aws-region: ap-southeast-1

      - name: Fetch Cluster Credentials
        uses: ./.github/actions/get-ssm-parameters
        with:
          ssm_param_path: "/gitops/${{ inputs.environment }}/clusters/${{ matrix.cluster_label }}"

      - name: Install kubectl
        uses: azure/setup-kubectl@v5
        with:
          version: "v1.29.0"

      - name: Run End-to-End Readiness Validation
        env:
          CLUSTER_ENV: ${{ inputs.environment }}
          CLUSTER_LABEL: ${{ matrix.cluster_label }}
        run: bash scripts/validate-cluster-readiness.sh

  readiness-gate:
    name: "Readiness Gate [${{ inputs.environment }}]"
    runs-on: ubuntu-latest
    needs: [discover-clusters, health-check, verify-sa-rbac, readiness-validation]
    if: always()

    outputs:
      result: ${{ steps.gate.outputs.result }}

    steps:
      - name: Evaluate Gate
        id: gate
        env:
          DISCOVERY_RESULT: ${{ needs.discover-clusters.result }}
          HEALTH_RESULT: ${{ needs.health-check.result }}
          SA_RESULT: ${{ needs.verify-sa-rbac.result }}
          READY_RESULT: ${{ needs.readiness-validation.result }}
        run: |
          if [ "${DISCOVERY_RESULT}" = "success" ] && \
             [ "${HEALTH_RESULT}" = "success" ] && \
             [ "${SA_RESULT}" = "success" ] && \
             [ "${READY_RESULT}" = "success" ]; then
            echo "result=success" >> "$GITHUB_OUTPUT"
          else
            echo "result=failure" >> "$GITHUB_OUTPUT"
          fi

      - name: Post Validation Summary
        if: always()
        env:
          ENV_INPUT: ${{ inputs.environment }}
          CLUSTER_COUNT: ${{ needs.discover-clusters.outputs.count || '0' }}
        run: |
          {
            echo "## Cluster Validation: \`${ENV_INPUT}\`"
            echo ""
            echo "| Check | Result |"
            echo "|-------|--------|"
            echo "| Discovery (${CLUSTER_COUNT} clusters) | ${{ needs.discover-clusters.result }} |"
            echo "| Health Check | ${{ needs.health-check.result }} |"
            echo "| SA/RBAC Verify | ${{ needs.verify-sa-rbac.result }} |"
            echo "| Readiness Validation | ${{ needs.readiness-validation.result }} |"
            echo "| **Overall Gate** | **${{ steps.gate.outputs.result }}** |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Enforce Gate
        if: steps.gate.outputs.result != 'success'
        run: |
          echo "::error title=Validation Gate Failed::One or more validation checks failed"
          exit 1
