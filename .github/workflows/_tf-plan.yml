# =============================================================================
# _tf-plan.yml — 可重用 Terraform Plan
# =============================================================================
# 呼叫者: terraform-plan.yml
#
# 執行內容：
#   1. Phase 2 (k8s) 透過 S3 terraform_remote_state 讀取 Phase 1 state
#   2. terraform init → validate → plan（初始化、驗證與規劃）
#   3. 將淨化後的 plan 結果輸出至 GITHUB_STEP_SUMMARY
#
# 安全性：
#   - TF_VAR_write_kubeconfig_files=false（不將 kubeconfig 寫入磁碟）
#   - Plan 輸出已過濾敏感欄位
#   - terraform_wrapper=false 保留 -detailed-exitcode 的退出碼
# =============================================================================

name: "[Reusable] Terraform Plan"

on:
  workflow_call:
    inputs:
      environment:
        description: "Target environment (dev | prod)"
        type: string
        required: true
      tf_dir:
        description: "Relative path to Terraform working directory"
        type: string
        required: true
      plan_key:
        description: "Unique plan label (e.g., dev-clusters, dev-k8s)"
        type: string
        required: true
      prepare_openvpn_bootstrap:
        description: "初次建立 OpenVPN 時是否模擬 runner /32 與 TCP/80 bootstrap"
        type: boolean
        required: false
        default: false
    secrets:
      AWS_ACCOUNT_ID:
        description: "AWS account ID used by the OIDC role ARN"
        required: true

jobs:
  plan:
    name: "tf plan [${{ inputs.plan_key }}]"
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    defaults:
      run:
        working-directory: ${{ inputs.tf_dir }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "~1.10"
          # 停用 wrapper 以保留 -detailed-exitcode 的退出碼
          terraform_wrapper: false

      - name: Configure AWS Credentials
        uses: ./.github/actions/configure-aws-credentials
        with:
          aws-account-id: ${{ secrets.AWS_ACCOUNT_ID }}
          aws-region: ap-southeast-1

      - name: Fetch SSM Parameters
        uses: ./.github/actions/get-ssm-parameters
        with:
          ssm_param_path: "/gitops/shared"

      - name: Validate OpenVPN Contact Email
        run: |
          if [[ ! "${OPENVPN_CONTACT_EMAIL:-}" =~ ^[^@[:space:]]+@[^@[:space:]]+\.[^@[:space:]]+$ ]]; then
            echo "::error title=Missing Parameter::SSM parameter /gitops/shared/OPENVPN_CONTACT_EMAIL is missing or invalid"
            exit 1
          fi

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config=backend.hcl \
            -reconfigure \
            -input=false
        env:
          TF_VAR_linode_token: ${{ env.LINODE_TOKEN }}

      - name: Terraform Validate
        run: terraform validate

      - name: Resolve OpenVPN Bootstrap Plan
        id: openvpn-bootstrap
        env:
          BOOTSTRAP_REQUESTED: ${{ inputs.prepare_openvpn_bootstrap }}
        run: |
          BOOTSTRAP_HTTP=false
          TRUSTED_ADMIN_CIDRS='[]'

          if [ "${BOOTSTRAP_REQUESTED}" = "true" ] && \
             ! terraform state list 2>/dev/null \
               | grep -Eq '^module\.openvpn\.linode_instance\.openvpn(\[0\])?$'; then
            RUNNER_IP=$(bash "${GITHUB_WORKSPACE}/scripts/discover-runner-public-ip.sh")
            echo "::add-mask::${RUNNER_IP}"

            BOOTSTRAP_HTTP=true
            TRUSTED_ADMIN_CIDRS="[\"${RUNNER_IP}/32\"]"
          fi

          {
            echo "bootstrap_http=${BOOTSTRAP_HTTP}"
            echo "trusted_admin_cidrs=${TRUSTED_ADMIN_CIDRS}"
          } >> "$GITHUB_OUTPUT"

      - name: Terraform Plan
        run: |
          set +e

          # 根據是否存在 tfvars 決定是否傳入 — 不是所有環境都有提交 tfvars
          TFVARS_ARGS=()
          if [ -f "terraform.tfvars" ]; then
            TFVARS_ARGS=(-var-file=terraform.tfvars)
          fi

          terraform plan \
            -input=false \
            -detailed-exitcode \
            -out=tfplan \
            "${TFVARS_ARGS[@]}" \
            > terraform-plan.log 2>&1

          PLAN_EXIT=$?
          set -e

          grep -v -iE "^\s*(token|secret|pass[w]ord)\s*=" terraform-plan.log || true

          case "${PLAN_EXIT}" in
            0) echo "No Terraform changes detected." ;;
            2) echo "Terraform changes detected." ;;
            1) echo "::error title=Plan Failed::terraform plan exited with error" ; exit 1 ;;
            *) echo "::error title=Plan Failed::terraform plan exited with unexpected code ${PLAN_EXIT}" ; exit 1 ;;
          esac
        env:
          TF_VAR_linode_token: ${{ env.LINODE_TOKEN }}
          TF_VAR_write_kubeconfig_files: "false"
          TF_VAR_openvpn_contact_email: ${{ env.OPENVPN_CONTACT_EMAIL }}
          TF_VAR_openvpn_bootstrap_http_enabled: ${{ steps.openvpn-bootstrap.outputs.bootstrap_http }}
          TF_VAR_trusted_admin_cidrs: ${{ steps.openvpn-bootstrap.outputs.trusted_admin_cidrs }}

      - name: Post Plan Summary
        if: always()
        run: |
          {
            echo "## Terraform Plan: \`${{ inputs.plan_key }}\`"
            echo ""
            if [ -f tfplan ]; then
              echo '```hcl'
              terraform show -no-color tfplan > terraform-plan-show.log 2>&1
              grep -v -iE "^\s*(token|secret|pass[w]ord)\s*=" terraform-plan-show.log | head -200 || true
              echo '```'
            else
              echo "_Plan file not available_"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
