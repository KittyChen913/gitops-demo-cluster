# =============================================================================
# terraform-apply-dev.yml — Terraform Apply 主流程（dev）
# =============================================================================
#
# ⚠️  dev 環境 Pipeline — 生產由 terraform-apply-prod.yml 管理
#
# dev 基礎設施佈建入口。
# 出於安全考量封鎖於 dev，防止意外部署至生產。
#
# 觸發條件：
#   - push 到 master 且 dev、bootstrap、共用 module、workflow/action/script
#     或 .gitattributes 變更 → Quality Gate 通過後自動 apply dev。
#     prod 與文件變更不會觸發部署。
#   - workflow_dispatch → 手動觸發（僅 dev）
#
# 生產部署請使用 terraform-apply-prod.yml：
#   - 僅在 semantic version tag（v*）觸發
#   - 強制 GitHub Environment "prod" 手動批准門戳
#   - 不會因 branch push 自動 apply
#
# 執行順序：
#   ┌─────────────────────────────────────────────────────────────────┐
#   │  [品質閘門] workflow-quality.yml                                 │
#   │  actionlint + ShellCheck + Ansible lint/syntax                   │
#   ├─────────────────────────────────────────────────────────────────┤
#   │  [初始化] bootstrap-backend                                     │
#   │  AWS S3 bucket（版本控制 + 加密 + 封鎖公開存取）              │
#   ├─────────────────────────────────────────────────────────────────┤
#   │  [階段 1] apply-infrastructure                                  │
#   │  terraform/environments/dev → 建立 LKE 與固定 OpenVPN          │
#   │  寫入: SSM cluster metadata 與 OpenVPN deployment material     │
#   ├─────────────────────────────────────────────────────────────────┤
#   │  [階段 2] apply-k8s          （needs: apply-infrastructure）     │
#   │  terraform/environments/dev-k8s → ArgoCD SA/RBAC/Token         │
#   │  讀取: S3 backend 中的 Phase 1 remote state                    │
#   │  寫入: SSM token（SecureString）                               │
#   ├─────────────────────────────────────────────────────────────────┤
#   │  [佈建後驗證] cluster-post-provision.yml（workflow_call）        │
#   │  統籌: 健康檢查 → SA/RBAC 驗證 → 就緒檢查               │
#   └─────────────────────────────────────────────────────────────────┘
#
# 環境保護：
#   dev — 不需批准，push 到 master 自動 apply
#
# 並行控制：
#   同時只允許一個 dev apply。新的執行會排隊而非取消。
# =============================================================================

name: "Terraform Apply — Dev"

on:
  push:
    branches:
      - master
    paths:
      - ".gitattributes"
      - ".github/workflows/**"
      - ".github/actions/**"
      - "scripts/**"
      - "terraform/environments/dev/**"
      - "terraform/environments/dev-k8s/**"
      - "terraform/environments/bootstrap/**"
      - "terraform/modules/**"

  # NOTE: workflow_dispatch 的生產觸發由 terraform-apply-prod.yml 處理
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment (dev only — use terraform-apply-prod.yml for prod)"
        type: choice
        options: [dev]
        required: true
        default: "dev"
      skip_post_provision:
        description: "Skip post-provision validation (use with caution)"
        type: boolean
        default: false

# 不允許並行的 dev apply。
# 生產使用 terraform-apply-prod.yml 中獨立的 concurrency group。
concurrency:
  group: tf-apply-dev
  cancel-in-progress: false

env:
  # 此 pipeline 僅限 dev。TARGET_ENV 始終為 "dev"。
  # 生產部署一律由 terraform-apply-prod.yml 處理。
  TARGET_ENV: dev

# 可重用 workflow（_bootstrap-backend.yml、_tf-apply.yml）要求 id-token: write
# 來執行 AWS OIDC 身份驗證。頂層 permissions 必須明確授予，
# 否則 nested job 會被限制為 id-token: none。
permissions:
  id-token: write
  contents: read

jobs:
  # ── Quality Gate：直接 push 或手動 apply 也必須先通過靜態檢查 ────────────────
  quality:
    name: "Workflow Quality Gate"
    uses: ./.github/workflows/workflow-quality.yml

  # ── 前置檢查：確認必要的 Secret 已設定 ─────────────────────────────────────
  preflight:
    name: "Pre-flight Check [dev]"
    runs-on: ubuntu-latest
    needs: quality
    outputs:
      target_env: ${{ steps.set-env.outputs.target_env }}
    steps:
      - name: Resolve target environment
        id: set-env
        run: |
          TARGET="dev"
          echo "target_env=${TARGET}" >> "$GITHUB_OUTPUT"
          echo "Target environment: ${TARGET}"

      - name: Validate OIDC prerequisites
        env:
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
        run: |
          if [ -z "${AWS_ACCOUNT_ID}" ]; then
            echo "::error title=Missing Secret::AWS_ACCOUNT_ID repository secret is not configured"
            echo "See README.md → CI/CD Configuration"
            exit 1
          fi
          echo "AWS Account ID configured ✓"

  # ── Bootstrap：確保 S3 bucket 存在 ─────────────────────────────────────────
  bootstrap-backend:
    name: "Bootstrap S3 Backend [dev]"
    needs: preflight
    uses: ./.github/workflows/_bootstrap-backend.yml
    secrets: inherit
    with:
      environment: ${{ needs.preflight.outputs.target_env }}

  # ── Phase 1：建立 LKE Cluster 與固定 OpenVPN ────────────────────────────────
  apply-infrastructure:
    name: "Phase 1 — Apply Infrastructure [${{ needs.preflight.outputs.target_env }}]"
    needs: [preflight, bootstrap-backend]
    uses: ./.github/workflows/_tf-apply.yml
    secrets: inherit
    with:
      environment: ${{ needs.preflight.outputs.target_env }}
      tf_dir: "terraform/environments/${{ needs.preflight.outputs.target_env }}"
      plan_key: "${{ needs.preflight.outputs.target_env }}-clusters"
      prepare_openvpn_bootstrap: true

  # ── 階段 2：ArgoCD SA / RBAC / Token ───────────────────────────────────────────────
  apply-k8s:
    name: "Phase 2 — Apply K8s SA/RBAC [${{ needs.preflight.outputs.target_env }}]"
    needs: [preflight, apply-infrastructure]
    uses: ./.github/workflows/_tf-apply.yml
    secrets: inherit
    with:
      environment: ${{ needs.preflight.outputs.target_env }}
      tf_dir: "terraform/environments/${{ needs.preflight.outputs.target_env }}-k8s"
      plan_key: "${{ needs.preflight.outputs.target_env }}-k8s"

  # ── Post-Provision：健康 + SA/RBAC + 就緒驗證 ────────────────────────────────────────
  post-provision:
    name: "Post-Provision Validation [${{ needs.preflight.outputs.target_env }}]"
    needs: [preflight, apply-k8s]
    if: |
      needs.apply-k8s.result == 'success' &&
      (github.event_name != 'workflow_dispatch' || inputs.skip_post_provision != true)
    uses: ./.github/workflows/cluster-post-provision.yml
    secrets: inherit
    with:
      environment: ${{ needs.preflight.outputs.target_env }}

  # ── 最終流程摘要 ─────────────────────────────────────────────────────────────
  pipeline-summary:
    name: "Pipeline Summary"
    runs-on: ubuntu-latest
    needs: [quality, preflight, bootstrap-backend, apply-infrastructure, apply-k8s, post-provision]
    if: always()
    steps:
      - name: Generate Pipeline Summary
        run: |
          TARGET="${{ needs.preflight.outputs.target_env }}"
          {
            echo "# GitOps Cluster Pipeline Summary"
            echo ""
            echo "**Environment:** \`${TARGET}\`  "
            echo "**Triggered by:** @${{ github.actor }}  "
            echo "**Commit:** \`${{ github.sha }}\`  "
            echo "**Run:** [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
            echo ""
            echo "## Job Results"
            echo ""
            echo "| Stage | Job | Status |"
            echo "|-------|-----|--------|"
            echo "| Quality | actionlint + ShellCheck + Ansible checks | ${{ needs.quality.result }} |"
            echo "| Pre-flight | Validate OIDC prerequisites | ${{ needs.preflight.result }} |"
            echo "| Bootstrap | S3 bucket (native locking) | ${{ needs.bootstrap-backend.result }} |"
            echo "| Phase 1 | Apply infrastructure | ${{ needs.apply-infrastructure.result }} |"
            echo "| Phase 2 | Apply k8s SA/RBAC | ${{ needs.apply-k8s.result }} |"
            echo "| Validation | Post-provision | ${{ needs.post-provision.result }} |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Set pipeline result
        env:
          QUALITY_RESULT: ${{ needs.quality.result }}
          INFRASTRUCTURE_RESULT: ${{ needs.apply-infrastructure.result }}
          K8S_RESULT:     ${{ needs.apply-k8s.result }}
        run: |
          if [ "${QUALITY_RESULT}" != "success" ] || \
             [ "${INFRASTRUCTURE_RESULT}" != "success" ] || \
             [ "${K8S_RESULT}" != "success" ]; then
            echo "::error::Pipeline failed — infrastructure may be in partial state"
            echo "Check logs and re-run after reviewing the terraform state."
            exit 1
          fi
          echo "Pipeline completed successfully ✓"
