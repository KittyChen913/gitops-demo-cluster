name: "Terraform Destroy"

run-name: "Destroy ${{ inputs.environment }} infrastructure by @${{ github.actor }}"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to destroy"
        type: choice
        options:
          - dev
          - prod
        required: true
        default: dev
      confirmation:
        description: "Type destroy-dev or destroy-prod to confirm"
        type: string
        required: true

permissions:
  id-token: write
  contents: read

# 與 apply 共用並行群組，避免同一環境同時執行 apply 與 destroy。
concurrency:
  group: tf-apply-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  preflight:
    name: "Validate Destroy Request"
    runs-on: ubuntu-latest
    steps:
      - name: Validate confirmation and credentials
        env:
          TARGET_ENV: ${{ inputs.environment }}
          CONFIRMATION: ${{ inputs.confirmation }}
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
        run: |
          EXPECTED="destroy-${TARGET_ENV}"

          if [ "${CONFIRMATION}" != "${EXPECTED}" ]; then
            echo "::error title=Confirmation Failed::Enter ${EXPECTED} to destroy ${TARGET_ENV}"
            exit 1
          fi

          if [ -z "${AWS_ACCOUNT_ID}" ]; then
            echo "::error title=Missing Secret::AWS_ACCOUNT_ID repository secret is not configured"
            exit 1
          fi

          echo "Destroy request confirmed for ${TARGET_ENV}."

  destroy:
    name: "Destroy Terraform Resources [${{ inputs.environment }}]"
    needs: preflight
    runs-on: ubuntu-latest

    # prod 環境應在 GitHub repository settings 設定 required reviewers。
    environment: ${{ inputs.environment }}

    env:
      TARGET_ENV: ${{ inputs.environment }}
      TF_IN_AUTOMATION: "true"
      TF_INPUT: "false"
      TF_VAR_write_kubeconfig_files: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "~1.10"
          terraform_wrapper: false

      - name: Configure AWS Credentials
        uses: ./.github/actions/configure-aws-credentials
        with:
          aws-account-id: ${{ secrets.AWS_ACCOUNT_ID }}
          aws-region: ap-southeast-1

      - name: Fetch Linode Token
        uses: ./.github/actions/get-ssm-parameters
        with:
          ssm_param_path: "/gitops/shared"

      - name: Validate Linode Token
        run: |
          if [ -z "${LINODE_TOKEN:-}" ]; then
            echo "::error title=Missing Parameter::SSM parameter /gitops/shared/LINODE_TOKEN is not configured"
            exit 1
          fi

      # 必須趁 Kubernetes API 仍可連線時，先移除 Phase 2 資源。
      - name: Plan Phase 2 Destroy
        id: plan_k8s
        working-directory: terraform/environments/${{ inputs.environment }}-k8s
        env:
          TF_VAR_linode_token: ${{ env.LINODE_TOKEN }}
        run: |
          terraform init \
            -backend-config=backend.hcl \
            -reconfigure

          set +e
          terraform state list > state-list.txt 2> state-list.err
          STATE_EXIT=$?
          set -e

          if [ "${STATE_EXIT}" -ne 0 ]; then
            if grep -q "No state file was found" state-list.err; then
              echo "has_resources=false" >> "$GITHUB_OUTPUT"
              echo "Phase 2 state does not exist; skipping."
              exit 0
            fi
            cat state-list.err
            exit "${STATE_EXIT}"
          fi

          MANAGED_RESOURCES=$(grep -v '^data\.' state-list.txt || true)
          if [ -z "${MANAGED_RESOURCES}" ]; then
            echo "has_resources=false" >> "$GITHUB_OUTPUT"
            echo "Phase 2 state has no managed resources; skipping."
            exit 0
          fi
          echo "has_resources=true" >> "$GITHUB_OUTPUT"

          TFVARS_ARGS=()
          if [ -f "terraform.tfvars" ]; then
            TFVARS_ARGS=(-var-file=terraform.tfvars)
          fi

          set +e
          terraform plan \
            -destroy \
            -detailed-exitcode \
            -no-color \
            -out=tfdestroy \
            "${TFVARS_ARGS[@]}" \
            > terraform-destroy-plan.log 2>&1
          PLAN_EXIT=$?
          set -e

          grep -v -iE "^[[:space:]]*(token|secret|password)[[:space:]]*=" \
            terraform-destroy-plan.log || true

          if [ "${PLAN_EXIT}" -ne 0 ] && [ "${PLAN_EXIT}" -ne 2 ]; then
            echo "::error title=Destroy Plan Failed::Phase 2 destroy plan exited with code ${PLAN_EXIT}"
            exit "${PLAN_EXIT}"
          fi

      - name: Destroy Phase 2 K8s Resources
        id: destroy_k8s
        if: steps.plan_k8s.outputs.has_resources == 'true'
        working-directory: terraform/environments/${{ inputs.environment }}-k8s
        env:
          TF_VAR_linode_token: ${{ env.LINODE_TOKEN }}
        run: |
          set +e
          terraform apply -auto-approve -no-color tfdestroy \
            > terraform-destroy-apply.log 2>&1
          APPLY_EXIT=$?
          set -e

          grep -v -iE "^[[:space:]]*(token|secret|password)[[:space:]]*=" \
            terraform-destroy-apply.log || true

          if [ "${APPLY_EXIT}" -ne 0 ]; then
            echo "::error title=Destroy Failed::Phase 2 destroy exited with code ${APPLY_EXIT}"
            exit "${APPLY_EXIT}"
          fi

      - name: Plan Phase 1 Destroy
        id: plan_clusters
        working-directory: terraform/environments/${{ inputs.environment }}
        env:
          TF_VAR_linode_token: ${{ env.LINODE_TOKEN }}
        run: |
          terraform init \
            -backend-config=backend.hcl \
            -reconfigure

          set +e
          terraform state list > state-list.txt 2> state-list.err
          STATE_EXIT=$?
          set -e

          if [ "${STATE_EXIT}" -ne 0 ]; then
            if grep -q "No state file was found" state-list.err; then
              echo "has_resources=false" >> "$GITHUB_OUTPUT"
              echo "Phase 1 state does not exist; skipping."
              exit 0
            fi
            cat state-list.err
            exit "${STATE_EXIT}"
          fi

          MANAGED_RESOURCES=$(grep -v '^data\.' state-list.txt || true)
          if [ -z "${MANAGED_RESOURCES}" ]; then
            echo "has_resources=false" >> "$GITHUB_OUTPUT"
            echo "Phase 1 state has no managed resources; skipping."
            exit 0
          fi
          echo "has_resources=true" >> "$GITHUB_OUTPUT"

          TFVARS_ARGS=()
          if [ -f "terraform.tfvars" ]; then
            TFVARS_ARGS=(-var-file=terraform.tfvars)
          fi

          set +e
          terraform plan \
            -destroy \
            -detailed-exitcode \
            -no-color \
            -out=tfdestroy \
            "${TFVARS_ARGS[@]}" \
            > terraform-destroy-plan.log 2>&1
          PLAN_EXIT=$?
          set -e

          grep -v -iE "^[[:space:]]*(token|secret|password)[[:space:]]*=" \
            terraform-destroy-plan.log || true

          if [ "${PLAN_EXIT}" -ne 0 ] && [ "${PLAN_EXIT}" -ne 2 ]; then
            echo "::error title=Destroy Plan Failed::Phase 1 destroy plan exited with code ${PLAN_EXIT}"
            exit "${PLAN_EXIT}"
          fi

      - name: Destroy Phase 1 Linode Resources
        id: destroy_clusters
        if: steps.plan_clusters.outputs.has_resources == 'true'
        working-directory: terraform/environments/${{ inputs.environment }}
        env:
          TF_VAR_linode_token: ${{ env.LINODE_TOKEN }}
        run: |
          set +e
          terraform apply -auto-approve -no-color tfdestroy \
            > terraform-destroy-apply.log 2>&1
          APPLY_EXIT=$?
          set -e

          grep -v -iE "^[[:space:]]*(token|secret|password)[[:space:]]*=" \
            terraform-destroy-apply.log || true

          if [ "${APPLY_EXIT}" -ne 0 ]; then
            echo "::error title=Destroy Failed::Phase 1 destroy exited with code ${APPLY_EXIT}"
            exit "${APPLY_EXIT}"
          fi

      - name: Write Destroy Summary
        if: always()
        env:
          PHASE2_RESULT: ${{ steps.destroy_k8s.outcome }}
          PHASE1_RESULT: ${{ steps.destroy_clusters.outcome }}
        run: |
          {
            echo "## Terraform Destroy"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Environment | \`${TARGET_ENV}\` |"
            echo "| Triggered by | @${{ github.actor }} |"
            echo "| Commit | \`${{ github.sha }}\` |"
            echo "| Phase 2 K8s | \`${PHASE2_RESULT}\` |"
            echo "| Phase 1 Linode | \`${PHASE1_RESULT}\` |"
            echo ""
            echo "The S3 state backend was retained for future Terraform apply runs."
          } >> "$GITHUB_STEP_SUMMARY"
