# =============================================================================
# _tf-apply.yml — 可重用 Terraform Apply
# =============================================================================
# 呼叫者: terraform-apply-dev.yml, terraform-apply-prod.yml
#
# 執行內容：
#   1. 以各環境提交的 backend.tf + backend.hcl 初始化 S3 backend
#   2. Phase 2 透過 S3 terraform_remote_state 讀取 Phase 1 state
#   3. terraform init → plan → apply（自動批准）
#   4. 輸出 apply 後摘要
#
# 生產環境需在 GitHub 儲存庫設定中為 "prod" Environment 配置必要審閱者。
# Job 執行于 environment: ${{ inputs.environment }}，自動強制進行批准流程。
#
# 安全性：
#   - TF_VAR_write_kubeconfig_files=false 防止 kubeconfig 寫入磁碟
#   - 所有輸出已過濾敏感欄位模式
#   - Concurrency group 防止相同環境同時 apply
# =============================================================================

name: "[Reusable] Terraform Apply"

on:
  workflow_call:
    inputs:
      environment:
        description: "Target environment (dev | prod)"
        type: string
        required: true
      tf_dir:
        description: "Relative path to Terraform working directory"
        type: string
        required: true
      plan_key:
        description: "Unique apply phase label (e.g., dev-clusters)"
        type: string
        required: true
      prepare_openvpn_bootstrap:
        description: "是否暫時開放 runner /32、檢查 OpenVPN readiness 並同步 Admin credential"
        type: boolean
        required: false
        default: false
    secrets:
      AWS_ACCOUNT_ID:
        description: "AWS account ID used by the OIDC role ARN"
        required: true
    outputs:
      apply_outcome:
        description: "Outcome of the apply step (success | failure)"
        value: ${{ jobs.apply.outputs.apply_outcome }}

jobs:
  apply:
    name: "tf apply [${{ inputs.plan_key }}]"
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    # GitHub Environment: "prod" 需要審閱者批准。
    # "dev" 沒有保護規則—自動執行。
    environment: ${{ inputs.environment }}

    # 防止相同環境/階段同時 apply。
    # cancel-in-progress: false 確保排隊中的 apply 不會被中斷。
    concurrency:
      group: tf-apply-${{ inputs.plan_key }}
      cancel-in-progress: false

    outputs:
      apply_outcome: ${{ steps.apply.outcome }}

    defaults:
      run:
        working-directory: ${{ inputs.tf_dir }}

    steps:
      # ── Prepare：工具、憑證與 Terraform backend ──────────────────────────────
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "~1.10"
          terraform_wrapper: false

      - name: Configure AWS Credentials
        uses: ./.github/actions/configure-aws-credentials
        with:
          aws-account-id: ${{ secrets.AWS_ACCOUNT_ID }}
          aws-region: ap-southeast-1

      - name: Fetch SSM Parameters
        uses: ./.github/actions/get-ssm-parameters
        with:
          ssm_param_path: "/gitops/shared"

      - name: Validate OpenVPN Contact Email
        run: |
          if [[ ! "${OPENVPN_CONTACT_EMAIL:-}" =~ ^[^@[:space:]]+@[^@[:space:]]+\.[^@[:space:]]+$ ]]; then
            echo "::error title=Missing Parameter::SSM parameter /gitops/shared/OPENVPN_CONTACT_EMAIL is missing or invalid"
            exit 1
          fi

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config=backend.hcl \
            -reconfigure \
            -input=false
        env:
          TF_VAR_linode_token: ${{ env.LINODE_TOKEN }}

      - name: Resolve OpenVPN Bootstrap Access
        id: openvpn-bootstrap
        env:
          BOOTSTRAP_REQUESTED: ${{ inputs.prepare_openvpn_bootstrap }}
          TF_VAR_linode_token: ${{ env.LINODE_TOKEN }}
          TF_VAR_write_kubeconfig_files: "false"
          TF_VAR_openvpn_contact_email: ${{ env.OPENVPN_CONTACT_EMAIL }}
          TF_VAR_openvpn_bootstrap_http_enabled: "false"
          TF_VAR_trusted_admin_cidrs: "[]"
        run: bash "${GITHUB_WORKSPACE}/scripts/openvpn-bootstrap.sh" resolve

      # ── Apply：以同一份 plan 套用 Phase 1 或 Phase 2 desired state ───────────
      - name: Terraform Plan (pre-apply)
        run: |
          set +e

          TFVARS_ARGS=()
          if [ -f "terraform.tfvars" ]; then
            TFVARS_ARGS=(-var-file=terraform.tfvars)
          fi

          terraform plan \
            -input=false \
            -detailed-exitcode \
            -out=tfplan \
            "${TFVARS_ARGS[@]}" \
            > terraform-plan.log 2>&1

          PLAN_EXIT=$?
          set -e

          grep -v -iE "^\s*(token|secret|pass[w]ord)\s*=" terraform-plan.log || true

          case "${PLAN_EXIT}" in
            0) echo "No Terraform changes detected." ;;
            2) echo "Terraform changes detected." ;;
            1) echo "::error title=Plan Failed::Plan step failed before apply"; exit 1 ;;
            *) echo "::error title=Plan Failed::Plan exited with unexpected code ${PLAN_EXIT}"; exit 1 ;;
          esac
        env:
          TF_VAR_linode_token: ${{ env.LINODE_TOKEN }}
          TF_VAR_write_kubeconfig_files: "false"
          TF_VAR_openvpn_contact_email: ${{ env.OPENVPN_CONTACT_EMAIL }}
          TF_VAR_openvpn_bootstrap_http_enabled: ${{ steps.openvpn-bootstrap.outputs.bootstrap_http }}
          TF_VAR_trusted_admin_cidrs: ${{ steps.openvpn-bootstrap.outputs.trusted_admin_cidrs }}

      - name: Terraform Apply
        id: apply
        run: |
          set +e

          terraform apply \
            -input=false \
            -auto-approve \
            tfplan \
            > terraform-apply.log 2>&1

          APPLY_EXIT=$?
          set -e

          grep -v -iE "^\s*(token|secret|pass[w]ord)\s*=" terraform-apply.log || true

          if [ "${APPLY_EXIT}" -ne "0" ]; then
            echo "::error title=Apply Failed::terraform apply exited with code ${APPLY_EXIT}"
            exit "${APPLY_EXIT}"
          fi
        env:
          TF_VAR_linode_token: ${{ env.LINODE_TOKEN }}
          TF_VAR_write_kubeconfig_files: "false"
          TF_VAR_openvpn_contact_email: ${{ env.OPENVPN_CONTACT_EMAIL }}
          TF_VAR_openvpn_bootstrap_http_enabled: ${{ steps.openvpn-bootstrap.outputs.bootstrap_http }}
          TF_VAR_trusted_admin_cidrs: ${{ steps.openvpn-bootstrap.outputs.trusted_admin_cidrs }}

      # ── OpenVPN bootstrap：檢查 readiness、同步 Admin credential 並關閉暫時權限 ──
      - name: Reconcile OpenVPN Marketplace Bootstrap
        if: steps.openvpn-bootstrap.outputs.needed == 'true' && steps.apply.outcome == 'success'
        env:
          TARGET_ENV: ${{ inputs.environment }}
          BOOTSTRAP_HTTP_ENABLED: ${{ steps.openvpn-bootstrap.outputs.bootstrap_http }}
          TF_VAR_linode_token: ${{ env.LINODE_TOKEN }}
          TF_VAR_write_kubeconfig_files: "false"
          TF_VAR_openvpn_contact_email: ${{ env.OPENVPN_CONTACT_EMAIL }}
          TF_VAR_openvpn_bootstrap_http_enabled: ${{ steps.openvpn-bootstrap.outputs.bootstrap_http }}
          TF_VAR_trusted_admin_cidrs: ${{ steps.openvpn-bootstrap.outputs.trusted_admin_cidrs }}
        run: bash "${GITHUB_WORKSPACE}/scripts/openvpn-bootstrap.sh" wait

      - name: Close OpenVPN Bootstrap Access
        if: always() && steps.openvpn-bootstrap.outputs.needed == 'true' && steps.apply.outcome != 'skipped'
        env:
          TF_VAR_linode_token: ${{ env.LINODE_TOKEN }}
          TF_VAR_write_kubeconfig_files: "false"
          TF_VAR_openvpn_contact_email: ${{ env.OPENVPN_CONTACT_EMAIL }}
          TF_VAR_openvpn_bootstrap_http_enabled: "false"
          TF_VAR_trusted_admin_cidrs: "[]"
        run: bash "${GITHUB_WORKSPACE}/scripts/openvpn-bootstrap.sh" close

      - name: Post Apply Summary
        if: always()
        run: |
          {
            echo "## Terraform Apply: \`${{ inputs.plan_key }}\`"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Environment | \`${{ inputs.environment }}\` |"
            echo "| Phase | \`${{ inputs.plan_key }}\` |"
            echo "| Outcome | \`${{ steps.apply.outcome }}\` |"
            echo "| OpenVPN bootstrap reconciliation | \`${{ steps.openvpn-bootstrap.outputs.needed }}\` |"
            echo "| OpenVPN replacement | \`${{ steps.openvpn-bootstrap.outputs.replacement }}\` |"
            echo "| Commit | \`${{ github.sha }}\` |"
            echo "| Actor | @${{ github.actor }} |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Notify on Apply Failure
        if: failure()
        run: |
          echo "::error title=Apply Failed::terraform apply failed for ${{ inputs.plan_key }}"
          echo "Check the logs above for details."
          echo "State may be partially modified — review before re-running."
