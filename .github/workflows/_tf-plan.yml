# =============================================================================
# _tf-plan.yml — 可重用 Terraform Plan
# =============================================================================
# 呼叫者: terraform-plan.yml
#
# 執行內容：
#   1. Phase 2 (k8s) 時：下載 Phase 1 state 至本機路徑
#      （dev-k8s/locals.tf 從 ../dev/terraform.tfstate 讀取）
#   2. terraform init → validate → plan
#   3. 上傳 plan artifact 供審閱 / apply 使用
#   4. 將淨化後的 plan 結果輸出至 GITHUB_STEP_SUMMARY
#
# 安全性：
#   - TF_VAR_write_kubeconfig_files=false（不將 kubeconfig 寫入磁碟）
#   - Plan 輸出已過濾 token= / secret= / password= 行
#   - terraform_wrapper=false 保留 -detailed-exitcode 的退出碼
# =============================================================================

name: "[Reusable] Terraform Plan"

on:
  workflow_call:
    inputs:
      environment:
        description: "Target environment (dev | prod)"
        type: string
        required: true
      tf_dir:
        description: "Relative path to Terraform working directory"
        type: string
        required: true
      plan_key:
        description: "Unique artifact key suffix (e.g., dev-clusters, dev-k8s)"
        type: string
        required: true
    outputs:
      has_changes:
        description: "true if plan contains infrastructure changes"
        value: ${{ jobs.plan.outputs.has_changes }}

jobs:
  plan:
    name: "tf plan [${{ inputs.plan_key }}]"
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    outputs:
      has_changes: ${{ steps.plan.outputs.has_changes }}

    defaults:
      run:
        working-directory: ${{ inputs.tf_dir }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "~1.10"
          # 停用 wrapper 以保留 -detailed-exitcode 的退出碼
          terraform_wrapper: false

      - name: Configure AWS Credentials
        uses: ./.github/actions/configure-aws-credentials
        with:
          aws-account-id: ${{ vars.AWS_ACCOUNT_ID }}
          aws-region: ap-southeast-1

      - name: Fetch SSM Parameters
        uses: ./.github/actions/get-ssm-parameters
        with:
          ssm_param_path: "/gitops/shared"

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config=backend.hcl \
            -reconfigure \
            -input=false
        env:
          TF_VAR_linode_token: ${{ env.LINODE_TOKEN }}

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: |
          set +e

          # 根據是否存在 tfvars 決定是否傳入 — 不是所有環境都有提交 tfvars
          TFVARS_ARG=""
          if [ -f "terraform.tfvars" ]; then
            TFVARS_ARG="-var-file=terraform.tfvars"
          fi

          terraform plan \
            -input=false \
            -detailed-exitcode \
            -out=tfplan \
            ${TFVARS_ARG} \
            2>&1 | grep -v -iE "^\s*(token|secret|password)\s*=" || true

          PLAN_EXIT=${PIPESTATUS[0]}

          case "${PLAN_EXIT}" in
            0) echo "has_changes=false" >> "$GITHUB_OUTPUT" ;;
            2) echo "has_changes=true"  >> "$GITHUB_OUTPUT" ;;
            1) echo "::error title=Plan Failed::terraform plan exited with error" ; exit 1 ;;
          esac
        env:
          TF_VAR_linode_token: ${{ env.LINODE_TOKEN }}
          TF_VAR_write_kubeconfig_files: "false"

      - name: Post Plan Summary
        if: always()
        run: |
          {
            echo "## Terraform Plan: \`${{ inputs.plan_key }}\`"
            echo ""
            if [ -f tfplan ]; then
              echo '```hcl'
              terraform show -no-color tfplan 2>&1 \
                | grep -v -iE "^\s*(token|secret|password)\s*=" \
                | head -200
              echo '```'
            else
              echo "_Plan file not available_"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Plan Artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: tfplan-${{ inputs.plan_key }}
          path: ${{ inputs.tf_dir }}/tfplan
          retention-days: 1
          if-no-files-found: warn
